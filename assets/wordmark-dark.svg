<?xml version="1.0" encoding="UTF-8"?>
<!--
  ThermaForge Partners — wordmark for DARK surfaces
  Source: Zach Rains' established brand identity. Chevron-A in THERMAFORGE
  echoes the angular geometry of the TF monogram. Copper-colored PARTNERS
  sub-line with copper rule on each side. Used on dark/charcoal backgrounds.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 130" role="img" aria-label="ThermaForge Partners">
  <title>ThermaForge Partners</title>
  <style>
    .therm { font-family: 'Helvetica Neue', 'Arial Black', Inter, sans-serif; font-weight: 900; font-size: 60px; letter-spacing: 2px; fill: #E8E8E5; }
    .partners { font-family: 'Helvetica Neue', Arial, Inter, sans-serif; font-weight: 600; font-size: 18px; letter-spacing: 14px; fill: #D75A11; }
  </style>

  <!-- THERM -->
  <text x="20" y="62" class="therm">THERM</text>

  <!-- chevron-A (no crossbar) replacing the letter A -->
  <g transform="translate(228, 16)">
    <polygon points="0,46 24,0 48,46 40,46 24,18 8,46" fill="#E8E8E5"/>
  </g>

  <!-- FORGE -->
  <text x="282" y="62" class="therm">FORGE</text>

  <!-- copper rules flanking PARTNERS -->
  <line x1="38"  y1="92" x2="245" y2="92" stroke="#D75A11" stroke-width="1.5"/>
  <line x1="495" y1="92" x2="660" y2="92" stroke="#D75A11" stroke-width="1.5"/>

  <!-- PARTNERS in copper, letter-spaced -->
  <text x="262" y="98" class="partners">PARTNERS</text>
</svg>
